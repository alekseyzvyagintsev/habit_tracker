  build:
#    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: |
          echo ${{ secrets.DOCKERHUB_TOKEN }} | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          export APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/habit_tracker
          export IMAGE_TAG=latest
          docker build -t $APP_IMAGE:$IMAGE_TAG .

      - name: Push Docker image
        run: |
          export APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/habit_tracker
          export IMAGE_TAG=latest
          docker push $APP_IMAGE:$IMAGE_TAG

  deploy:
    # if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Make deploy directory on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p ${{ secrets.DEPLOY_DIR }}"

      - name: Copy docker-compose.yml to server
        run: |
          scp docker-compose.yml ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}/docker-compose.yml

      - name: Copy nginx config to server
        run: |
          scp -r ./nginx ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:${{ secrets.DEPLOY_DIR }}/nginx

      - name: Create .env and deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            cd ${{ secrets.DEPLOY_DIR }}
            # Создаем файл .env
            cat > .env << INNER_EOF
          SECRET_KEY=${{ secrets.SECRET_KEY }}
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          CHAT_ID=${{ secrets.CHAT_ID }}
          DEBUG=False
          IN_DOCKER=True
          DB_NAME=${{ secrets.DB_NAME }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_HOST=db
          DB_PORT=${{ secrets.DB_PORT }}
          EMAIL_HOST=${{ secrets.EMAIL_HOST }}
          EMAIL_PORT=${{ secrets.EMAIL_PORT }}
          EMAIL_USE_TLS=${{ secrets.EMAIL_USE_TLS }}
          EMAIL_USE_SSL=${{ secrets.EMAIL_USE_SSL }}
          EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}
          EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}
          DEFAULT_FROM_EMAIL=${{ secrets.DEFAULT_FROM_EMAIL }}
          INNER_EOF
          EOF
          
      - name: Deploy Docker image
        run: |
          # Скрипт для деплоя на сервер и перезапуска контейнера
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << EOF
            set -e  # остановить выполнение при ошибке
            cd ${{ secrets.DEPLOY_DIR }}  # перейти в директорию деплоя
          
            # Переменные
            export APP_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/habit_tracker # имя образа в Docker Hub
            export IMAGE_TAG=latest  # тег для деплоя

            # Остановить и удалить старые контейнеры
            docker compose down || true

            # Удалить старый образ (если был)
            docker image prune -a || true
          
            # Загружаем свежий образ
            docker compose pull
          
            # Запустить новый контейнер
            docker compose up -d --force-recreate
          
            echo "Деплой завершен: $APP_IMAGE:$IMAGE_TAG"
          EOF
